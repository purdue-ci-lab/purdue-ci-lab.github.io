pi:
  name: Sotiris Nousias
  role: Principal Investigator
  title: Assistant Professor, Department of Computer Science, Purdue University
  image: nousias.jpg # assets/img/nousias.jpg — replace with a real photo
  homepage: https://sotirisnousias.com/
  scholar: https://scholar.google.com/citations?user=BIFpV5UAAAAJ
  twitter: https://x.com/Sotiris_No
  email: snousias@purdue.edu # TODO: confirm email
  blurb: >
    Sotiris leads the Computational Imaging Lab. His research sits at the
    intersection of computer vision, computational photography, and neural
    fields, developing cameras and algorithms that reason about light at the
    level of individual photons.

